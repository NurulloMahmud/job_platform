{% extends "base.html" %}
{% block title %}Create a Company — CodefyJobs{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="mx-auto w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900">Create your company</h1>
      <p class="text-gray-500 mt-2 text-sm">You need a company profile before posting jobs</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600"></div>

      <form id="company-form" class="space-y-5" onsubmit="handleCreateCompany(event)">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
          <input
            id="name" type="text" required
            placeholder="Acme Corp"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition text-sm"
        >
          Create Company &amp; Continue
        </button>
      </form>

    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Guard: must be logged in
document.addEventListener("DOMContentLoaded", () => {
  const token = getToken();
  if (!token || !isTokenValid(token)) {
    window.location.href = "/login?next=" + encodeURIComponent(window.location.pathname + window.location.search);
  }
});

async function handleCreateCompany(e) {
  e.preventDefault();
  const btn   = document.getElementById("submit-btn");
  const errEl = document.getElementById("error-msg");
  errEl.classList.add("hidden");
  btn.disabled = true;
  btn.textContent = "Creating…";

  const name = document.getElementById("name").value.trim();

  try {
    const res = await fetch("/companies/", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ name }),
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.detail || "Failed to create company");
    }

    const next = new URLSearchParams(window.location.search).get("next") || "/jobs/new";
    window.location.href = next;

  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove("hidden");
    btn.disabled = false;
    btn.textContent = "Create Company & Continue";
  }
}
</script>
{% endblock %}
