{% extends "base.html" %}
{% block title %}Post a Job — CodefyJobs{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-lg">

    <div class="text-center mb-8">
      <div class="mx-auto w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900">Post a new job</h1>
      <p class="text-gray-500 mt-2 text-sm">Fill in the vacancy details below</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600"></div>
      <div id="loading-msg" class="mb-4 p-3 bg-indigo-50 border border-indigo-100 rounded-lg text-sm text-indigo-600">
        Loading your companies…
      </div>

      <form id="job-form" class="hidden space-y-5" onsubmit="handleCreateJob(event)">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
          <input
            id="title" type="text" required
            placeholder="e.g. Senior Backend Engineer"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Position / Department</label>
          <input
            id="position" type="text" required
            placeholder="e.g. Engineering"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Annual Salary (USD)</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
            <input
              id="salary" type="number" min="0" step="100" required
              placeholder="80000"
              class="w-full border border-gray-300 rounded-xl pl-8 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
          <select
            id="company-select" required
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white"
          ></select>
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition text-sm"
        >
          Post Job
        </button>
      </form>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const token = getToken();
  if (!token || !isTokenValid(token)) {
    window.location.href = "/login?next=/jobs/new";
    return;
  }

  // Ensure user info is cached
  if (!getUser()) {
    const r = await fetch("/auth/me", { headers: authHeaders() });
    if (!r.ok) { clearAuth(); window.location.href = "/login"; return; }
    saveUser(await r.json());
  }

  const userId = getUser().id;

  // Fetch all companies and filter to only the user's own
  const res = await fetch("/companies/");
  if (!res.ok) {
    showError("Could not load companies. Please try again.");
    return;
  }
  const companies = await res.json();
  const mine = companies.filter(c => c.owner_id === userId);

  if (mine.length === 0) {
    // Shouldn't normally happen (postJobFlow guards this), but handle gracefully
    window.location.href = "/companies/new?next=/jobs/new";
    return;
  }

  // Populate dropdown
  const select = document.getElementById("company-select");
  mine.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.name;
    select.appendChild(opt);
  });

  document.getElementById("loading-msg").classList.add("hidden");
  document.getElementById("job-form").classList.remove("hidden");
});

async function handleCreateJob(e) {
  e.preventDefault();
  const btn   = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Posting…";

  const title      = document.getElementById("title").value.trim();
  const position   = document.getElementById("position").value.trim();
  const salary     = parseFloat(document.getElementById("salary").value);
  const company_id = parseInt(document.getElementById("company-select").value);

  try {
    const res = await fetch("/jobs/", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ title, position, salary, company_id }),
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.detail || "Failed to post job");
    }
    window.location.href = "/";
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = "Post Job";
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.classList.remove("hidden");
}
</script>
{% endblock %}
