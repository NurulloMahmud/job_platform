{% extends "base.html" %}
{% block title %}Login — CodefyJobs{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900">Welcome back</h1>
      <p class="text-gray-500 mt-2 text-sm">Sign in to your CodefyJobs account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600"></div>

      <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            id="email" type="email" required autocomplete="email"
            placeholder="you@example.com"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            id="password" type="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition text-sm"
        >
          Sign In
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="/register" class="text-indigo-600 hover:underline font-medium">Register</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const errEl = document.getElementById("error-msg");
  errEl.classList.add("hidden");
  btn.disabled = true;
  btn.textContent = "Signing in…";

  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    // 1. Login → get token
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.detail || "Login failed");
    }
    const { access_token } = await res.json();
    saveToken(access_token);

    // 2. Fetch user info
    const meRes = await fetch("/auth/me", { headers: authHeaders() });
    if (meRes.ok) saveUser(await meRes.json());

    // 3. Redirect
    const next = new URLSearchParams(window.location.search).get("next") || "/";
    window.location.href = next;

  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove("hidden");
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
}
</script>
{% endblock %}
